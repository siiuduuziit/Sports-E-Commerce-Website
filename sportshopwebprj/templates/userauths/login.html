{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Đăng nhập | Coza Store</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'images/icons/favicon.png' %}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'fonts/font-awesome-4.7.0/css/font-awesome.min.css' %}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'fonts/iconic/css/material-design-iconic-font.min.css' %}"
    />
    <link rel="stylesheet" type="text/css" href="{% static 'css/util.css' %}" />
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}" />
    <link rel="stylesheet" type="text/css" href="{% static 'css/login.css' %}" />
  </head>
  <body class="animsition">
    {% include 'partials/header_index.html' %}

    <div class="container login-container p-t-100 p-b-100">
      <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-4">
          <div class="login-card animisition">
            <div class="login-header">
              <h3 class="mtext-105">Chào mừng trở lại!</h3>
              <p class="stext-102">Vui lòng đăng nhập để tiếp tục</p>
            </div>

            <div class="login-body">
              <form method="POST" action="{% url 'userauths:login_view' %}">
                {% csrf_token %}

                <div class="input-group-custom">
                  <i class="zmdi zmdi-email"></i>
                  <input
                    type="email"
                    name="email"
                    placeholder="Địa chỉ Email"
                    required
                  />
                </div>

                <div class="input-group-custom">
                  <i class="zmdi zmdi-lock"></i>
                  <input
                    type="password"
                    name="password"
                    placeholder="Mật khẩu"
                    required
                  />
                </div>

                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="remember"
                      name="remember"
                    />
                    <label class="form-check-label stext-102" for="remember"
                      >Ghi nhớ tôi</label
                    >
                  </div>
                  <a href="#" class="stext-102 cl6 hov-cl1 trans-04"
                    >Quên mật khẩu?</a
                  >
                </div>

                <button type="submit" class="btn-login stext-101">
                  Đăng nhập
                </button>

                <div class="login-footer-text">
                  Bạn chưa có tài khoản?
                  <a href="{% url 'userauths:register_view' %}">Đăng ký ngay</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    {% include 'partials/footer.html' %}

    <script src="{% static 'vendor/jquery/jquery-3.2.1.min.js' %}"></script>
    <script src="{% static 'vendor/animsition/js/animsition.min.js' %}"></script>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
