<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Phản hồi từ SportShop</title>
</head>
<body>
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
        <h2 style="color: #0d6efd;">Cảm ơn bạn đã liên hệ với chúng tôi!</h2>
        <p>Xin chào {{ full_name }},</p>
        <p>Chúng tôi đã nhận được tin nhắn của bạn với nội dung:</p>
        <blockquote style="padding: 10px; background-color: #f8f9fa; border-left: 5px solid #0d6efd;">
            {{ message }}
        </blockquote>
        <p>Chúng tôi sẽ phản hồi bạn sớm nhất có thể.</p>
        <p>Thân ái,<br>Đội ngũ SportShop</p>
    </div>
</body>
</html>
