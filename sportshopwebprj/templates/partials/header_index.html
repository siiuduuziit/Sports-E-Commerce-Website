{% load static %}
<header class="header-v4">
  <div class="container-menu-desktop">
    <div class="top-bar">
      <div class="content-topbar flex-sb-m h-full container">
        <div class="left-top-bar">
          <span class="stext-101 cl6">
            Free shipping for standard order over
            <b class="cl1">1.000.000 VND</b>
          </span>
        </div>

        <div class="right-top-bar flex-w h-full">
          <a href="#" class="flex-c-m trans-04 p-lr-25 stext-101 cl6 hov-cl1">
            Help & FAQs
          </a>

          {% if user.is_authenticated %}
          <div class="dropdown flex-c-m h-full">
            <a
              href="#"
              class="dropdown-toggle flex-c-m h-full p-lr-25 stext-101 cl6 hov-cl1 trans-04"
            >
              <i class="zmdi zmdi-account-circle m-r-8 fs-18"></i>
              {{ user.username|default:user.email }}
              <i class="fa fa-caret-down m-l-5"></i>
            </a>

            <div class="dropdown-menu">
              <a
                href="{% url 'core:account-details' %}"
                class="dropdown-item stext-101"
              >
                <i class="zmdi zmdi-account m-r-10"></i> Account Details
              </a>
              <a
                href="{% url 'core:shopping-cart' %}"
                class="dropdown-item stext-101"
              >
                <i class="zmdi zmdi-shopping-cart m-r-10"></i> My Orders
              </a>
              <div style="border-top: 1px solid #eee; margin: 5px 0"></div>
              <a
                href="{% url 'userauths:logout_view' %}"
                class="dropdown-item stext-101 cl1"
              >
                <i class="zmdi zmdi-run m-r-10"></i> Log Out
              </a>
            </div>
          </div>
          {% else %}
          <a
            href="{% url 'userauths:login_view' %}"
            class="flex-c-m trans-04 p-lr-25 stext-101 cl6 hov-cl1"
          >
            <i class="zmdi zmdi-account-o m-r-5"></i> My Account
          </a>
          {% endif %}

          <a href="#" class="flex-c-m trans-04 p-lr-25 stext-101 cl6 hov-cl1">
            EN
          </a>
          <a href="#" class="flex-c-m trans-04 p-lr-25 stext-101 cl6 hov-cl1">
            VND
          </a>
        </div>
      </div>
    </div>

    <div class="wrap-menu-desktop">
      <nav class="limiter-menu-desktop container">
        <a href="{% url 'core:index' %}" class="logo">
          <img src="{% static 'images/icons/logo-01.png' %}" alt="IMG-LOGO" />
        </a>

        <div class="menu-desktop">
          <ul class="main-menu">
            <li class="{% if request.path == '/' %}active-menu{% endif %}">
              <a href="{% url 'core:index' %}">Home</a>
            </li>
            <li
              class="{% if '/products/' in request.path %}active-menu{% endif %}"
            >
              <a href="{% url 'core:products' %}">Shop</a>
            </li>
            <li><a href="{% url 'core:about' %}">About</a></li>
            <li><a href="{% url 'core:contact-us' %}">Contact</a></li>
          </ul>
        </div>

        <div class="wrap-icon-header flex-w flex-r-m">
          <!-- <div
            class="icon-header-item cl2 hov-cl1 trans-04 p-l-22 p-r-11 js-show-modal-search"
          >
            <i class="zmdi zmdi-search"></i>
          </div> -->
          <div
            class="icon-header-item cl2 hov-cl1 trans-04 p-l-22 p-r-11 icon-header-noti js-show-cart"
            data-notify="{{ request.session.cart_data_obj|length }}"
          >
            <i class="zmdi zmdi-shopping-cart"></i>
          </div>
          <a
            href="{% url 'core:account-details' %}"
            id="wishlist-header-icon"
            class="dis-block icon-header-item cl2 hov-cl1 trans-04 p-l-22 p-r-11 icon-header-noti"
            data-notify="{{ total_wishlist_items|default:0 }}"
          >
            <i class="zmdi zmdi-favorite-outline"></i>
          </a>
        </div>
      </nav>
    </div>
  </div>
</header>
